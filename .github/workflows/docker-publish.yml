name: Docker publish

# Builds the four application images and pushes them to the single Docker
# Hub repo fforzano99/xgsail, tagged <service>-latest and
# <service>-sha-<short-sha>. Mirrors scripts/build-images.sh's
# context/dockerfile pairs. Watchtower on the VM polls *-latest and
# redeploys on its own — this workflow only publishes.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  DOCKERHUB_REPO: fforzano99/xgsail

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend + worker deps
        run: |
          pip install --no-cache-dir -r deploy/requirements.txt
          pip install --no-cache-dir -r workers/process_upload/requirements.txt
          pip install --no-cache-dir ./libs/xgsail_windfusion
          pip install --no-cache-dir pytest
      - name: Backend tests
        run: pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend typecheck + build
        working-directory: frontend
        run: npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: deploy/Dockerfile.backend
          - service: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - service: process-upload
            context: .
            dockerfile: workers/process_upload/Dockerfile
          - service: video
            context: ./workers/video
            dockerfile: workers/video/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set short sha
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-latest
            ${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-sha-${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-latest
          cache-to: type=inline
