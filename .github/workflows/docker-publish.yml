name: Docker publish

# Builds the application images and pushes them to the single Docker Hub
# repo fforzano99/xgsail, tagged <service>-latest and
# <service>-sha-<short-sha>. Mirrors scripts/build-images.sh's
# context/dockerfile pairs. Watchtower on the VM polls *-latest and
# redeploys on its own — this workflow only publishes.
#
# ota-service is a container too, so it rides the same build-and-push +
# Watchtower flow as backend/frontend/workers. The native app's JS bundle
# is a different kind of artifact (not a container Watchtower can restart
# into existence on a phone) — deploy-ota publishes it separately via
# scripts/deploy-ota.sh whenever frontend/ changes, so the already-installed
# native app self-updates on next launch. See docs/ota-updates.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  DOCKERHUB_REPO: fforzano99/xgsail

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend + worker deps
        run: |
          pip install --no-cache-dir -r deploy/requirements.txt
          pip install --no-cache-dir -r workers/process_upload/requirements.txt
          pip install --no-cache-dir ./libs/xgsail_windfusion
          pip install --no-cache-dir pytest
      - name: Backend tests
        run: pytest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Frontend typecheck + build
        working-directory: frontend
        run: npm run build

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: deploy/Dockerfile.backend
          - service: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
          - service: process-upload
            context: .
            dockerfile: workers/process_upload/Dockerfile
          - service: video
            context: ./workers/video
            dockerfile: workers/video/Dockerfile
          - service: ota-service
            context: .
            dockerfile: ota-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set short sha
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-latest
            ${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-sha-${{ steps.sha.outputs.short }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-latest
          cache-to: type=inline

  # Publishes the native app's JS bundle via scripts/deploy-ota.sh whenever
  # frontend/ changes on main. Independent of the `publish` job above: this
  # doesn't touch a container image, it uploads straight to the production
  # MinIO (over its public endpoint) so ota-service can serve the new
  # manifest immediately — no Watchtower/redeploy involved on this path.
  deploy-ota:
    needs: [changes, test]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install MinIO client (mc)
        run: |
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

      - name: Publish OTA update
        env:
          OTA_API_BASE: ${{ secrets.OTA_API_BASE }}
          SAILFRAMES_S3_ENDPOINT: ${{ secrets.SAILFRAMES_S3_PUBLIC_ENDPOINT }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          SAILFRAMES_BUCKET: ${{ secrets.SAILFRAMES_BUCKET }}
        run: scripts/deploy-ota.sh
