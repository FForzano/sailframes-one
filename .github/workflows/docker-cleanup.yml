name: Docker Hub cleanup

# Prunes old fforzano99/xgsail sha-tagged images, keeping the newest 10 per
# service (see scripts/dockerhub-prune-tags.sh). *-latest is never touched.

on:
  schedule:
    - cron: "0 4 * * 1" # every Monday 04:00 UTC
  workflow_dispatch: {}

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prune old tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: scripts/dockerhub-prune-tags.sh 10
