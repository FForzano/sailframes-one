server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API: proxy /api to the backend container so the SPA and API
    # share one origin — auth cookies stay first-party and there's no CORS.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache hashed assets; the SPA entry stays uncached.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback so client-side deep links (e.g. /races/123) resolve on reload.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
