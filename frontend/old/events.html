<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SailFrames - Events</title>
    <link rel="stylesheet" href="./assets/css/main.css?v=10">
    <link rel="stylesheet" href="./assets/css/race.css?v=38">
    <link rel="stylesheet" href="./assets/css/events.css?v=1">
    <script src="./config.js"></script>
    <script src="./assets/js/analytics.js"></script>
</head>
<body class="events-page">
    <header class="header">
        <a href="./" class="logo-link"><h1 class="logo">SailFrames</h1></a>
        <span class="nav-title">Events</span>
        <div class="header-links">
            <a href="./races.html" class="nav-link">Series</a>
            <a href="./sessions.html" class="nav-link">Sessions</a>
            <a href="./session.html" class="nav-link">Timeline</a>
            <a href="./race.html" class="nav-link">Race</a>
        </div>
    </header>

    <main class="events-main">
        <!-- Column 1: Regattas -->
        <section class="events-column" id="regattas-column">
            <div class="column-header">
                <h2>Regattas</h2>
                <button id="btn-new-regatta" class="btn-icon" title="New Regatta" style="display:none">+</button>
            </div>
            <div class="column-body" id="regattas-list">
                <div class="column-empty">Loading...</div>
            </div>
        </section>

        <!-- Column 2: Race Days -->
        <section class="events-column" id="racedays-column">
            <div class="column-header">
                <h2>Race Days</h2>
                <button id="btn-new-raceday" class="btn-icon" title="New Race Day" style="display:none">+</button>
            </div>
            <div class="column-body" id="racedays-list">
                <div class="column-empty">Select a regatta</div>
            </div>
        </section>

        <!-- Column 3: Races -->
        <section class="events-column" id="races-column">
            <div class="column-header">
                <h2>Races</h2>
                <button id="btn-new-race" class="btn-icon" title="New Race" style="display:none">+</button>
            </div>
            <div class="column-body" id="races-list">
                <div class="column-empty">Select a race day</div>
            </div>
        </section>
    </main>

    <!-- Regatta Modal -->
    <div class="modal" id="regatta-modal" style="display:none">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="regatta-modal-title">New Regatta</h2>
                <button class="modal-close" id="regatta-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="regatta-name">Name</label>
                    <input type="text" id="regatta-name" placeholder="J/80 Spring Series 2026">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="regatta-venue">Venue</label>
                        <input type="text" id="regatta-venue" placeholder="Boston Harbor">
                    </div>
                    <div class="form-group">
                        <label for="regatta-boat-class-input">Boat Class</label>
                        <select id="regatta-boat-class-input"></select>
                        <div class="form-hint" id="regatta-boat-class-hint"></div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" id="regatta-boat-class-custom-group" style="display:none">
                        <label for="regatta-boat-class-custom-name">Custom Class Name</label>
                        <input type="text" id="regatta-boat-class-custom-name" placeholder="e.g. Snipe">
                        <label for="regatta-boat-class-custom-loa" style="margin-top:8px">LOA (meters)</label>
                        <input type="number" step="0.01" min="0" id="regatta-boat-class-custom-loa" placeholder="4.72">
                        <label for="regatta-boat-class-custom-offset" style="margin-top:8px">GPS antenna → bow (meters)</label>
                        <input type="number" step="0.01" min="0" id="regatta-boat-class-custom-offset" placeholder="auto: 38% of LOA">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="regatta-start-date">Start Date</label>
                        <input type="date" id="regatta-start-date">
                    </div>
                    <div class="form-group">
                        <label for="regatta-end-date">End Date</label>
                        <input type="date" id="regatta-end-date">
                    </div>
                </div>
                <div class="form-group">
                    <label for="regatta-nor-url">Notice of Race (URL)</label>
                    <input type="url" id="regatta-nor-url" placeholder="https://…">
                </div>
                <div class="form-group">
                    <label for="regatta-si-url">Sailing Instructions (URL)</label>
                    <input type="url" id="regatta-si-url" placeholder="https://…">
                </div>
                <div class="form-group">
                    <label for="regatta-website-url">Regatta Website (URL)</label>
                    <input type="url" id="regatta-website-url" placeholder="https://…">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="btn-delete-regatta" style="margin-right:auto;display:none">Delete Regatta</button>
                <button class="btn-secondary" id="regatta-cancel">Cancel</button>
                <button class="btn-primary" id="regatta-save">Save</button>
            </div>
        </div>
    </div>

    <!-- Race Day Modal -->
    <div class="modal" id="raceday-modal" style="display:none">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="raceday-modal-title">New Race Day</h2>
                <button class="modal-close" id="raceday-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label for="raceday-date">Date</label>
                        <input type="date" id="raceday-date">
                    </div>
                    <div class="form-group">
                        <label for="raceday-type">Type</label>
                        <select id="raceday-type">
                            <option value="race_day">Race Day</option>
                            <option value="training_day">Training Day</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="raceday-name">Name <span class="label-optional">(optional)</span></label>
                    <input type="text" id="raceday-name" placeholder="Day 1 — Race Day">
                </div>
                <div class="form-group">
                    <label for="raceday-regatta">Regatta</label>
                    <select id="raceday-regatta">
                        <option value="">None</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="btn-delete-raceday" style="margin-right:auto;display:none">Delete Race Day</button>
                <button class="btn-secondary" id="raceday-cancel">Cancel</button>
                <button class="btn-primary" id="raceday-save">Save</button>
            </div>
        </div>
    </div>

    <!-- Race Modal -->
    <div class="modal" id="race-modal" style="display:none">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="race-modal-title">New Race</h2>
                <button class="modal-close" id="race-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="race-name">Race Name</label>
                    <input type="text" id="race-name" placeholder="Race 1">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="race-date">Date</label>
                        <input type="date" id="race-date">
                    </div>
                    <div class="form-group">
                        <label for="race-regatta">Regatta</label>
                        <select id="race-regatta">
                            <option value="">None</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="race-start-time">Start Time (gun)</label>
                        <input type="time" id="race-start-time" step="1">
                    </div>
                    <div class="form-group">
                        <label for="race-end-time">End Time</label>
                        <input type="time" id="race-end-time" step="1">
                    </div>
                </div>
                <div class="form-group">
                    <label for="race-raceday">Race Day</label>
                    <select id="race-raceday">
                        <option value="">None</option>
                    </select>
                </div>
                <div class="race-modal-hint">
                    To assign boats and sessions, open this race in the <a href="./race.html" target="_blank">Race Dashboard</a>.
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="btn-delete-race" style="margin-right:auto;display:none">Delete Race</button>
                <button class="btn-secondary" id="race-cancel">Cancel</button>
                <button class="btn-primary" id="race-save">Save</button>
            </div>
        </div>
    </div>

    <script type="module" src="./assets/js/events-app.js?v=4"></script>
</body>
</html>
