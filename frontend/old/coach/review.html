<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review &middot; SailFrames Coach</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>*</text></svg>">
    <link rel="stylesheet" href="./coach.css?v=15">
    <script src="../config.js"></script>
    <script src="./coach.js?v=5"></script>
</head>
<body>
    <div id="nav-host"></div>
    <main class="coach-container">
        <div id="review-host">
            <div class="empty-state"><span class="spinner"></span> Loading briefing…</div>
        </div>
    </main>

    <script>
        if (!SailFramesCoach.requireAuth()) { /* redirected */ }
        document.getElementById('nav-host').innerHTML = SailFramesCoach.nav('<a href="./index.html">Briefings</a> &rsaquo; Review');
        SailFramesCoach.wireNav();

        const params = new URLSearchParams(window.location.search);
        const raceId = params.get('race') || '';
        const deviceId = params.get('boat') || '';
        if (!raceId || !deviceId) {
            document.getElementById('review-host').innerHTML =
                '<div class="empty-state" style="color:var(--danger)">Missing race or boat in URL.</div>';
            throw new Error('missing params');
        }

        let briefing = null;
        let raceData = null;
        let raceDef = null;
        let buoyData = null;
        let saveTimer = null;
        const RACE_API = (window.SAILFRAMES_API_URL || '').replace(/\/+$/, '');
        const RACE_OVERVIEW_ID = '_race';
        const PRIMARY_WIND_STATIONS = ['44013', 'KBOS', 'CSIM3'];

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c =>
                ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
        }

        // First-render-only: build the page skeleton with stable containers.
        // Subsequent renders update only the header and paragraph list — they
        // NEVER touch #replay-host (which holds the iframe). Destroying the
        // iframe between captures was the root cause of "only the first one
        // works": render() ripped out the iframe, and the next iteration of
        // the auto-capture loop tried to call functions on a detached window.
        function buildSkeleton() {
            const host = document.getElementById('review-host');
            if (host.querySelector('#paragraph-list-container')) return;   // already built
            host.innerHTML = `
                <div id="review-header-host"></div>
                <div id="replay-host"></div>
                <div class="paragraph-list" id="paragraph-list-container"></div>
                <div id="attachments-host"></div>
            `;
        }

        function render() {
            buildSkeleton();
            const status = (briefing.status || 'in_review').replace(/[^a-z_]/g, '');
            const counts = briefing.paragraphs.reduce((a, p) => {
                a[p.status] = (a[p.status] || 0) + 1; return a;
            }, {});
            const isOverview = briefing.device_id === RACE_OVERVIEW_ID;
            const subjectLabel = isOverview
                ? '🏁 Race overview'
                : escapeHtml(briefing.team_name || briefing.device_id);
            const canExport = (counts.approved || 0) > 0;
            const exportTitle = canExport
                ? 'Open print view (use the browser print dialog → Save as PDF)'
                : 'Approve at least one paragraph first';
            document.getElementById('review-header-host').innerHTML = `
                <header class="review-header">
                    <h1>${subjectLabel}
                        <span class="muted" style="font-weight:400; font-size:1rem">— ${escapeHtml(briefing.race_name || briefing.race_id)}</span>
                    </h1>
                    <span class="status-badge status-${status}">${status.replace('_', ' ')}</span>
                    <button class="secondary" id="export-pdf-btn" ${canExport ? '' : 'disabled'} title="${escapeHtml(exportTitle)}">Export PDF</button>
                    <div class="review-meta">
                        Race date <strong>${escapeHtml(briefing.race_date || '—')}</strong>
                        &nbsp;·&nbsp; Generated <strong>${SailFramesCoach.fmtDate(briefing.generated_at)}</strong>
                        &nbsp;·&nbsp; Reviewer <strong>${escapeHtml(SailFramesCoach.reviewerName(briefing.reviewer_email))}</strong>
                        &nbsp;·&nbsp; Approved <strong>${counts.approved || 0}</strong> /
                        Pending <strong>${counts.pending || 0}</strong> /
                        Deleted <strong>${counts.deleted || 0}</strong>
                    </div>
                </header>
            `;
            document.getElementById('paragraph-list-container').innerHTML =
                briefing.paragraphs.map(renderParagraph).join('');

            wireParagraphInteractions();
            const pdfBtn = document.getElementById('export-pdf-btn');
            if (pdfBtn) pdfBtn.addEventListener('click', () => {
                const url = `./print.html?race=${encodeURIComponent(raceId)}&boat=${encodeURIComponent(deviceId)}`;
                window.open(url, '_blank', 'noopener');
            });
            renderReplay();         // idempotent — only builds the iframe the first time
            renderAttachments();
        }

        // Patch a single paragraph card's image area in place. Used after a
        // successful capture so we don't re-run render() (which would do
        // unnecessary DOM work but is now safe — kept for performance and
        // because in-loop full re-renders flicker the user's editing).
        function patchParagraphImage(para) {
            const card = document.querySelector(`.paragraph-card[data-id="${para.id}"]`);
            if (!card) return;
            const body = card.querySelector('.para-body');
            if (!body) return;
            let imgCol = body.querySelector('.para-image-col');
            if (para.image && para.image.image_data_uri) {
                const figHtml = `<figure class="image-fig"><img class="image-svg" src="${para.image.image_data_uri}" alt=""></figure>`;
                if (imgCol) {
                    imgCol.innerHTML = figHtml;
                } else {
                    // Insert image col before the textarea inside .para-body.
                    body.insertAdjacentHTML('afterbegin', `<div class="para-image-col">${figHtml}</div>`);
                    body.classList.add('has-image');
                }
            } else if (imgCol) {
                imgCol.remove();
                body.classList.remove('has-image');
            }
        }

        function renderParagraph(p) {
            const text = p.text_edited != null ? p.text_edited : p.text_original;
            const editedTag = p.text_edited != null && p.text_edited !== p.text_original
                ? '<span class="edited">edited</span>' : '';
            const reviewerTag = p.reviewed_by
                ? `<span>reviewed by ${escapeHtml(p.reviewed_by)} · ${SailFramesCoach.fmtDate(p.reviewed_at)}</span>`
                : '';
            let imageTag = '';
            let captureBtn = '';
            let inlineImg = '';
            if (p.image && p.image.type && p.image.type !== 'none') {
                const range = (p.image.t_start_iso || p.image.t_end_iso)
                    ? `${SailFramesCoach.fmtTimeLocal(p.image.t_start_iso)}–${SailFramesCoach.fmtTimeLocal(p.image.t_end_iso)}` : '';
                imageTag = `<span class="image-hint" title="${escapeHtml(p.image.rationale || '')}">📍 ${escapeHtml(p.image.type)}${range ? ' · ' + range : ''}</span>`;
                captureBtn = `<button class="para-cap-btn" data-act="capture-para" title="Scrub the replay to this paragraph's end time and capture the map view">📷 Recapture this view</button>`;
            }
            if (p.image && p.image.image_data_uri) {
                // No duplicate recapture button here — the one in the actions
                // row above handles it. Image is just the image.
                inlineImg = `<figure class="image-fig"><img class="image-svg" src="${p.image.image_data_uri}" alt=""></figure>`;
            }
            const hasImage = !!(p.image && p.image.image_data_uri);
            return `
                <div class="paragraph-card" data-id="${p.id}" data-status="${p.status}">
                    <div class="para-head">
                        <span class="para-section">${escapeHtml(p.section || '—')}</span>
                        <div class="para-actions">
                            ${captureBtn}
                            <button class="approve ${p.status === 'approved' ? 'active' : ''}" data-act="approve">✓ Approve</button>
                            <button class="delete  ${p.status === 'deleted' ? 'active' : ''}"  data-act="delete">✕ Delete</button>
                            <button class="reset"   data-act="reset" title="Revert edited text to original">⟲ Reset text</button>
                        </div>
                    </div>
                    <div class="para-body${hasImage ? ' has-image' : ''}">
                        ${hasImage ? `<div class="para-image-col">${inlineImg}</div>` : ''}
                        <textarea class="para-text" rows="6" data-act="edit">${escapeHtml(text)}</textarea>
                    </div>
                    <div class="para-meta">
                        ${imageTag}
                        ${editedTag}
                        ${reviewerTag}
                    </div>
                </div>
            `;
        }

        // ---- Per-paragraph image hints render as labels only. ----
        // The actual screenshots come from the coach via the replay iframe
        // (system screenshot → paste, or via the file upload), so we don't
        // try to auto-render a static SVG preview here. The label tells the
        // coach which view to capture.

        function isoToMs(s) {
            if (!s) return null;
            const ms = new Date(s).getTime();
            return Number.isFinite(ms) ? ms : null;
        }

        // ---- Replay = iframed race.html (full feature parity: tiles, boat
        // toggles, trail length, course, wind, names — all the validated
        // controls of the live race page). Coaches add screenshots via
        // file upload or clipboard paste below the iframe. ----

        function renderReplay() {
            const host = document.getElementById('replay-host');
            if (!host) return;
            // IDEMPOTENT: if the iframe already exists in the host, leave
            // it alone. Re-rendering would destroy it and force a full
            // page reload + race-data re-fetch + tile re-download — which
            // is what was breaking auto-capture after the first paragraph.
            if (host.querySelector('#race-frame')) return;
            // The iframe is now purely a visual reference — captures go
            // through the server-side Puppeteer Lambda which renders the
            // real Light Blue basemap natively. So the iframe can show
            // Light Blue too (no need for a Voyager workaround).
            const baseQs = `race=${encodeURIComponent(raceId)}&leaderboard_hidden=1&legend_compact=1&_=${Date.now()}`;
            const fullSrc = `../race.html?${baseQs}`;
            host.innerHTML = `
                <section class="replay-card">
                    <div class="replay-controls">
                        <strong style="color:var(--text-primary)">Race replay</strong>
                        <span class="muted" style="font-size:0.78rem">Set up the view inside the frame, then click capture. Per-paragraph views below have already been captured automatically.</span>
                        <span class="spacer"></span>
                        <span class="muted" id="auto-capture-status" style="font-size:0.78rem"></span>
                        <a class="replay-btn" href="${fullSrc}" target="_blank" rel="noopener" title="Open the full race page in a new tab for more screen room">Open in new tab ↗</a>
                        <button class="replay-btn" id="recapture-all-btn" title="Discard all per-paragraph images and capture every section again with the latest capture engine">🔄 Recapture all sections</button>
                        <button class="replay-btn primary" id="capture-map-btn" title="Capture the current map view and add it as a separate screenshot">📷 Capture extra screenshot</button>
                    </div>
                    <iframe id="race-frame" class="replay-iframe" src="${fullSrc}" title="Race replay"></iframe>
                </section>
            `;
            const btn = document.getElementById('capture-map-btn');
            if (btn) btn.addEventListener('click', captureFromIframe);
            const recapAllBtn = document.getElementById('recapture-all-btn');
            if (recapAllBtn) recapAllBtn.addEventListener('click', recaptureAll);
            // Kick off the auto-capture sweep for any image_hint that doesn't
            // yet have a stored image_data_uri.
            autoCaptureMissing();
        }

        // Force re-capture of every paragraph with an image_hint, ignoring
        // any image_data_uri already stored. Used to refresh stale captures
        // produced by older capture-engine versions.
        async function recaptureAll() {
            if (autoCaptureRunning) {
                SailFramesCoach.toast('A capture sweep is already running', 'error', 3000);
                return;
            }
            if (!briefing || !Array.isArray(briefing.paragraphs)) return;
            const candidates = briefing.paragraphs.filter(p =>
                p.image && p.image.type && p.image.type !== 'none'
            );
            if (!candidates.length) {
                SailFramesCoach.toast('No paragraphs with image hints to recapture', 'error');
                return;
            }
            if (!window.confirm(`Recapture all ${candidates.length} per-paragraph images?\n\nThis will replace whatever's there now.`)) return;
            // Wipe existing image_data_uri so autoCaptureMissing picks them up.
            for (const p of candidates) {
                if (p.image && p.image.image_data_uri) {
                    delete p.image.image_data_uri;
                    p._dirty = true;
                    patchParagraphImage(p);     // remove the old <img> from the card
                }
            }
            await autoCaptureMissing();
        }

        // Sequentially capture every paragraph's image_hint that doesn't
        // already have an image_data_uri. Idempotent — re-renders skip
        // already-captured paragraphs, and a coach's manual recapture is
        // preserved.
        // Server-side Puppeteer capture engine version. Bump when the
        // screenshot Lambda changes meaningfully so existing images that
        // came from older engines get auto-replaced on next page load.
        const CAPTURE_ENGINE_VERSION = 101;

        let autoCaptureRunning = false;
        async function autoCaptureMissing() {
            if (autoCaptureRunning) return;
            if (!briefing || !Array.isArray(briefing.paragraphs)) return;
            const candidates = briefing.paragraphs.filter(p => {
                if (!p.image || !p.image.type || p.image.type === 'none') return false;
                if (!p.image.t_end_iso && !p.image.t_start_iso) return false;
                if (!p.image.image_data_uri) return true;
                return (p.image.capture_engine_version || 0) < CAPTURE_ENGINE_VERSION;
            });
            if (!candidates.length) return;

            autoCaptureRunning = true;
            const statusEl = document.getElementById('auto-capture-status');
            const setStatus = (msg) => { if (statusEl) statusEl.innerHTML = msg ? `<span class="spinner"></span> ${msg}` : ''; };

            for (let i = 0; i < candidates.length; i++) {
                const p = candidates[i];
                setStatus(`capturing view ${i + 1} of ${candidates.length} via server (${escapeHtml(p.section || '')})`);
                try {
                    await captureOne(p, null);
                } catch (e) {
                    console.warn('[autoCapture] failed for', p.id, e);
                }
            }
            setStatus('');
            scheduleSave();
            SailFramesCoach.toast('Per-paragraph views captured', 'success', 1800);
            autoCaptureRunning = false;
        }

        async function captureFromIframe() {
            const btn = document.getElementById('capture-map-btn');
            const iframe = document.getElementById('race-frame');
            if (!iframe || !iframe.contentWindow) {
                SailFramesCoach.toast('Race replay not loaded', 'error', 4000);
                return;
            }
            const win = iframe.contentWindow;
            if (typeof win.captureMapPng !== 'function') {
                SailFramesCoach.toast('Race page still loading — wait a few seconds and retry', 'error', 5000);
                return;
            }
            const originalLabel = btn ? btn.textContent : '';
            if (btn) { btn.disabled = true; btn.textContent = '… waiting for map'; }
            try {
                let waited = 0;
                while (typeof win.captureReady === 'function' && !win.captureReady() && waited < 20000) {
                    await new Promise(r => setTimeout(r, 400));
                    waited += 400;
                }
                if (btn) btn.textContent = '… capturing';
                const dataUrl = await win.captureMapPng();
                if (!dataUrl || dataUrl.length < 1500) throw new Error('empty image (map may still be loading tiles)');
                const capDefault = `Map · ${SailFramesCoach.fmtTimeLocal(new Date().toISOString())}`;
                const caption = window.prompt('Caption for this screenshot:', capDefault);
                if (caption == null) return;
                if (!Array.isArray(briefing.attachments)) briefing.attachments = [];
                briefing.attachments.push({
                    id: 'a' + Date.now(),
                    image_data_uri: dataUrl,
                    caption: caption || capDefault,
                    captured_at_iso: new Date().toISOString(),
                    captured_by: SailFramesCoach.getEmail() || '',
                });
                renderAttachments();
                scheduleSave();
                SailFramesCoach.toast('Map screenshot added', 'success', 1800);
            } catch (e) {
                SailFramesCoach.toast(`Capture failed: ${e.message || e}`, 'error', 6000);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = originalLabel; }
            }
        }

        // ---- Attachments gallery ----
        function renderAttachments() {
            const host = document.getElementById('attachments-host');
            if (!host) return;
            const atts = (briefing && briefing.attachments) || [];
            if (!atts.length) { host.innerHTML = ''; return; }
            const cards = atts.map((a, i) => `
                <div class="attachment-card" data-att-id="${a.id}">
                    <img src="${a.image_data_uri}" alt="${escapeHtml(a.caption || '')}">
                    <textarea class="caption" data-att-cap="${a.id}">${escapeHtml(a.caption || '')}</textarea>
                    <div class="meta">
                        <span>${escapeHtml(SailFramesCoach.fmtDate(a.captured_at_iso))}</span>
                        <button class="remove" data-att-del="${a.id}">Remove</button>
                    </div>
                </div>
            `).join('');
            host.innerHTML = `
                <section class="attachments-section">
                    <h2>Captured screenshots (${atts.length})</h2>
                    <div class="attachment-grid">${cards}</div>
                </section>
            `;
            for (const ta of host.querySelectorAll('textarea[data-att-cap]')) {
                ta.addEventListener('input', () => {
                    const id = ta.getAttribute('data-att-cap');
                    const a = briefing.attachments.find(x => x.id === id);
                    if (a) { a.caption = ta.value; scheduleSave(); }
                });
            }
            for (const btn of host.querySelectorAll('button[data-att-del]')) {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-att-del');
                    if (!confirm('Remove this screenshot?')) return;
                    briefing.attachments = briefing.attachments.filter(x => x.id !== id);
                    renderAttachments();
                    scheduleSave();
                });
            }
        }

        function wireParagraphInteractions() {
            for (const card of document.querySelectorAll('.paragraph-card')) {
                const id = card.getAttribute('data-id');
                const para = briefing.paragraphs.find(p => p.id === id);
                if (!para) continue;
                const ta = card.querySelector('textarea[data-act="edit"]');
                ta.addEventListener('input', () => {
                    const v = ta.value;
                    para.text_edited = (v === para.text_original) ? null : v;
                    para._dirty = true;
                    scheduleSave();
                });
                for (const btn of card.querySelectorAll('button[data-act]')) {
                    btn.addEventListener('click', () => onAction(para, btn.getAttribute('data-act')));
                }
            }
        }

        function onAction(para, action) {
            if (action === 'approve') {
                para.status = (para.status === 'approved') ? 'pending' : 'approved';
            } else if (action === 'delete') {
                para.status = (para.status === 'deleted') ? 'pending' : 'deleted';
            } else if (action === 'reset') {
                para.text_edited = null;
                const ta = document.querySelector(`.paragraph-card[data-id="${para.id}"] textarea`);
                if (ta) ta.value = para.text_original;
            } else if (action === 'capture-para' || action === 'recapture-para') {
                captureForParagraph(para);
                return;     // captureForParagraph handles re-render + save
            }
            para._dirty = true;
            render();
            scheduleSave();
        }

        // Shared capture-for-one-paragraph routine. Captures via the
        // server-side Puppeteer Lambda (real Chromium, real Light Blue
        // basemap, real Leaflet rendering) — no more html2canvas hacks.
        // The iframe stays as a visual reference for the coach but is
        // not used for the actual capture.
        async function captureOne(para, win) {
            if (!raceDef || !raceDef.start_time) throw new Error('race definition not loaded');
            const t0 = isoToMs(raceDef.start_time);
            const tStartIso = para.image && para.image.t_start_iso;
            const tEndIso = para.image && para.image.t_end_iso;
            const tS = tStartIso ? isoToMs(tStartIso) : null;
            const tE = tEndIso ? isoToMs(tEndIso) : null;
            if (!tE || !t0) throw new Error('paragraph image_hint missing time range');

            const tEndSec = Math.max(0, Math.round((tE - t0) / 1000));
            const tStartSec = (tS && tS > t0) ? Math.max(0, Math.round((tS - t0) / 1000)) : 0;

            const result = await SailFramesCoach.api('/capture', {
                method: 'POST',
                body: JSON.stringify({
                    race_id: raceId,
                    t_seconds: tEndSec,
                    t_start_seconds: tStartSec,
                    t_end_seconds: tEndSec,
                }),
            });
            const dataUrl = result && result.image_data_uri;
            if (!dataUrl || dataUrl.length < 1500) throw new Error('empty image from server');

            if (!para.image) para.image = { type: 'race_map_segment' };
            para.image.image_data_uri = dataUrl;
            para.image.captured_at_iso = new Date().toISOString();
            para.image.captured_by = SailFramesCoach.getEmail() || '';
            // Capture engine version: bump every time the screenshot Lambda
            // changes meaningfully so old images get auto-replaced.
            para.image.capture_engine_version = 101;     // server-side Puppeteer v2 (clip + square viewport)
            para._dirty = true;
            patchParagraphImage(para);
            scheduleSave();
            return true;
        }

        async function captureForParagraph(para) {
            const btn = document.querySelector(`.paragraph-card[data-id="${para.id}"] [data-act="capture-para"], .paragraph-card[data-id="${para.id}"] [data-act="recapture-para"]`);
            const orig = btn ? btn.textContent : '';
            if (btn) { btn.disabled = true; btn.textContent = '… capturing on server'; }
            try {
                await captureOne(para, null);
                SailFramesCoach.toast('Captured for this paragraph', 'success', 1500);
            } catch (e) {
                SailFramesCoach.toast(`Capture failed: ${e.message || e}`, 'error', 6000);
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = orig; }
            }
        }

        function scheduleSave() {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(saveNow, 700);
        }

        async function saveNow() {
            try {
                briefing = await SailFramesCoach.api(
                    `/briefings/${encodeURIComponent(raceId)}/${encodeURIComponent(deviceId)}`,
                    { method: 'PUT', body: JSON.stringify(briefing) }
                );
                SailFramesCoach.toast('Saved', 'success', 1200);
            } catch (e) {
                SailFramesCoach.toast(`Save failed: ${e.message}`, 'error', 5000);
            }
        }

        async function load() {
            try {
                // Briefing + race data + race definition + buoy/wind, all in parallel.
                const briefingP = SailFramesCoach.api(
                    `/briefings/${encodeURIComponent(raceId)}/${encodeURIComponent(deviceId)}`
                );
                const dataP = fetch(`${RACE_API}/api/races/${encodeURIComponent(raceId)}/data?sensors=gps`)
                    .then(r => r.ok ? r.json() : null);
                const defP = fetch(`${RACE_API}/api/races/${encodeURIComponent(raceId)}`)
                    .then(r => r.ok ? r.json() : null);

                // Wind: needs a time window. Use briefing's race date as a hint;
                // get the race def first to learn the actual race window.
                const [bRes, dRes, defRes] = await Promise.allSettled([briefingP, dataP, defP]);
                if (bRes.status !== 'fulfilled') throw bRes.reason;
                briefing = bRes.value;
                raceData = (dRes.status === 'fulfilled') ? dRes.value : null;
                raceDef = (defRes.status === 'fulfilled') ? defRes.value : null;

                if (raceDef && raceDef.start_time && raceDef.end_time) {
                    const startTs = Math.floor(new Date(raceDef.start_time).getTime() / 1000);
                    const endTs = Math.floor(new Date(raceDef.end_time).getTime() / 1000);
                    try {
                        const r = await fetch(`${RACE_API}/api/buoys/data?start_ts=${startTs}&end_ts=${endTs}`);
                        if (r.ok) buoyData = await r.json();
                    } catch {}
                }
                render();
            } catch (e) {
                document.getElementById('review-host').innerHTML =
                    `<div class="empty-state" style="color:var(--danger)">${escapeHtml(e.message)}</div>`;
            }
        }

        load();
    </script>
</body>
</html>
