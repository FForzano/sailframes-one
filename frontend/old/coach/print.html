<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print briefing &middot; SailFrames Coach</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>*</text></svg>">
    <link rel="stylesheet" href="./coach.css?v=5">
    <script src="../config.js"></script>
    <script src="./coach.js?v=5"></script>
</head>
<body class="print-page">
    <div class="print-container" id="print-host">
        <div class="print-empty"><span class="spinner"></span> Loading…</div>
    </div>

    <script>
        if (!SailFramesCoach.requireAuth()) { /* redirected */ }

        const params = new URLSearchParams(window.location.search);
        const raceId = params.get('race') || '';
        const deviceId = params.get('boat') || '';
        const RACE_OVERVIEW_ID = '_race';

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c =>
                ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]);
        }

        async function load() {
            const host = document.getElementById('print-host');
            if (!raceId || !deviceId) {
                host.innerHTML = '<div class="print-empty" style="color:#c00">Missing race or boat in URL.</div>';
                return;
            }
            try {
                const briefing = await SailFramesCoach.api(
                    `/briefings/${encodeURIComponent(raceId)}/${encodeURIComponent(deviceId)}`
                );
                renderPrint(briefing);
                setTimeout(() => window.print(), 350);
            } catch (e) {
                host.innerHTML = `<div class="print-empty" style="color:#c00">${escapeHtml(e.message)}</div>`;
            }
        }

        function renderPrint(briefing) {
            const isOverview = briefing.device_id === RACE_OVERVIEW_ID;
            const subject = isOverview
                ? 'Race overview · whole fleet'
                : (briefing.team_name || briefing.device_id);
            const approved = (briefing.paragraphs || []).filter(p => p.status === 'approved');
            const reviewer = SailFramesCoach.reviewerName(briefing.reviewer_email);
            let html = `
                <header class="print-header">
                    <h1>${escapeHtml(subject)} &mdash; ${escapeHtml(briefing.race_name || briefing.race_id)}</h1>
                    <div class="print-meta">
                        Race date <strong>${escapeHtml(briefing.race_date || '—')}</strong>
                        &nbsp;·&nbsp; Reviewed by <strong>${escapeHtml(reviewer)}</strong>
                        &nbsp;·&nbsp; ${approved.length} approved paragraph${approved.length === 1 ? '' : 's'}
                    </div>
                </header>
            `;
            if (!approved.length) {
                html += '<div class="print-empty">No approved paragraphs to print yet.</div>';
            } else {
                for (const p of approved) {
                    const text = (p.text_edited != null && p.text_edited !== '') ? p.text_edited : p.text_original;
                    let img = '';
                    if (p.image && p.image.image_data_uri) {
                        img = `<div class="print-image"><img src="${p.image.image_data_uri}" alt=""></div>`;
                    }
                    html += `
                        <section class="print-section">
                            <h3 class="print-section-title">${escapeHtml(p.section || '—')}</h3>
                            <p class="print-text">${escapeHtml(text)}</p>
                            ${img}
                        </section>
                    `;
                }
            }
            // Captured screenshots from the coach (replay frames, system captures, etc.).
            const atts = (briefing.attachments || []);
            if (atts.length) {
                html += '<div class="print-attachments"><h2>Coach screenshots</h2>';
                for (const a of atts) {
                    const tStr = a.captured_t_ms
                        ? SailFramesCoach.fmtTimeLocal(new Date(a.captured_t_ms).toISOString())
                        : (a.captured_at_iso ? SailFramesCoach.fmtTimeLocal(a.captured_at_iso) : '');
                    html += `
                        <figure class="print-attachment">
                            <img src="${a.image_data_uri}" alt="${escapeHtml(a.caption || '')}">
                            <figcaption class="caption">${escapeHtml(a.caption || '')}</figcaption>
                            ${tStr ? `<div class="meta">Captured ${escapeHtml(tStr)}</div>` : ''}
                        </figure>
                    `;
                }
                html += '</div>';
            }
            html += `
                <footer class="print-footer">
                    SailFrames.com at courageoussailing.org
                </footer>
            `;
            document.getElementById('print-host').innerHTML = html;
        }

        load();
    </script>
</body>
</html>
