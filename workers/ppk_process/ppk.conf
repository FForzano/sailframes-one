# RTKLIB PPK Configuration for SailFrames
# Kinematic post-processing with CORS base station

pos1-posmode       =kinematic
pos1-frequency     =l1+l2
pos1-soltype       =combined
pos1-elmask        =15
pos1-snrmask_r     =off
pos1-snrmask_b     =off
pos1-dynamics      =on
pos1-tidecorr      =off
pos1-ionoopt       =brdc
pos1-tropopt       =saas
pos1-sateph        =brdc
pos1-posopt1       =off
pos1-posopt2       =off
pos1-posopt3       =off
pos1-posopt4       =off
pos1-posopt5       =off
pos1-exclsats      =
pos1-navsys        =15

pos2-armode        =continuous
pos2-gloarmode     =on
pos2-bdsarmode     =off
pos2-arthres       =2.0
pos2-arlockcnt     =0
pos2-arelmask      =0
pos2-arminfix      =3
pos2-armaxiter     =1
pos2-elmaskhold    =0
pos2-aroutcnt      =5
pos2-maxage        =60
pos2-syncsol       =off
pos2-slipthres     =0.05
pos2-rejionno      =30
pos2-rejgdop       =30
pos2-niter         =1
pos2-baselen       =0
pos2-basesig       =0

out-solformat      =llh
out-outhead        =on
out-outopt         =on
out-outvel         =off
out-timesys        =gpst
out-timeform       =tow
out-timendec       =3
out-degform        =deg
out-fieldsep       =
out-outsingle      =on
out-maxsolstd      =0
out-height         =ellipsoidal
out-geoid          =internal
out-solstatic      =all
out-nmeaintv1      =0
out-nmeaintv2      =0
out-outstat        =residual

stats-eratio1      =100
stats-eratio2      =100
stats-errphase     =0.003
stats-errphaseel   =0.003
stats-errphasebl   =0
stats-errdoppler   =1
stats-stdbias      =30
stats-stdiono      =0.03
stats-stdtrop      =0.3
stats-prnaccelh    =10
stats-prnaccelv    =10
stats-prnbias      =0.0001
stats-prniono      =0.001
stats-prntrop      =0.0001
stats-prnpos       =0
stats-clkstab      =5e-12

ant1-postype       =llh
ant1-pos1          =0
ant1-pos2          =0
ant1-pos3          =0
ant1-anttype       =
ant1-antdele       =0
ant1-antdeln       =0
ant1-antdelu       =0

ant2-postype       =rinexhead
ant2-pos1          =0
ant2-pos2          =0
ant2-pos3          =0
ant2-anttype       =
ant2-antdele       =0
ant2-antdeln       =0
ant2-antdelu       =0
ant2-maxaveep      =0
ant2-initrst       =on

misc-timeinterp    =on
misc-sbasatsel     =0
misc-rnxopt1       =
misc-rnxopt2       =

# Observation code priority for GPS L2 (prefer L2C over P(Y))
pos1-codepri_gps_l2  =XSLWPYMCQ
misc-pppopt        =

# Debug settings - trace level 3 for double-diff diagnostics
file-tracepath     =/tmp/trace.txt
file-tracelevel    =3
