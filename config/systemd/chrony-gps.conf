# SailFrames chrony GPS time sync configuration
# Uses GPS time from gpsd when offline (on the water)
#
# Install: sudo cp chrony-gps.conf /etc/chrony/conf.d/gps.conf
# Apply:   sudo systemctl restart chrony

# GPS via gpsd shared memory
# SHM 0 = NMEA time from gpsd (typically ~100ms accuracy)
# refid GPS marks this as GPS source in chronyc sources
refclock SHM 0 refid GPS precision 1e-1 offset 0.0 delay 0.2 poll 3 trust

# Allow larger time steps at startup to sync from GPS quickly
# This is important when the system clock is way off (like 65 minutes!)
# -1 means unlimited steps (always allow correction)
makestep 1 -1

# When offline (no NTP), prefer GPS
# Lower stratum = higher priority
local stratum 10
