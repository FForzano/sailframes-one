# SailFrames journald configuration
# Enables persistent logging for post-sail debugging
#
# Install: sudo cp journald-sailframes.conf /etc/systemd/journald.conf.d/sailframes.conf
# Apply:   sudo systemctl restart systemd-journald

[Journal]
# Store logs on disk (survives reboot)
Storage=persistent

# Compress logs to save space
Compress=yes

# Limit total disk usage to 500MB
SystemMaxUse=500M

# Keep at least 100MB free on disk
SystemKeepFree=100M

# Individual log file max size
SystemMaxFileSize=50M

# Keep logs for 2 weeks
MaxRetentionSec=2week

# Rotate logs daily
MaxFileSec=1day

# Store all log levels (debug, info, notice, warning, err, crit, alert, emerg)
MaxLevelStore=debug

# Sync to disk every 1 minute (balance between safety and SD card wear)
SyncIntervalSec=1m

# Rate limiting - allow bursts for sensor debugging
RateLimitIntervalSec=30s
RateLimitBurst=10000
