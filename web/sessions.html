<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SailFrames - Sessions</title>

    <!-- Day.js -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/utc.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/timezone.js"></script>

    <link rel="stylesheet" href="./assets/css/main.css?v=9">
    <style>
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .sessions-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-cleanup {
            padding: 8px 16px;
            font-size: 13px;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-cleanup:disabled {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .cleanup-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .date-group {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .date-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }

        .date-count {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .sessions-list {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .session-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            transition: border-color 0.2s;
        }

        .session-card:hover {
            border-color: var(--accent);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .session-id {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .device-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }

        .device-badge.e1 { background: var(--accent); }
        .device-badge.e2 { background: #9333ea; }
        .device-badge.e3 { background: #10b981; }
        .device-badge.e4 { background: #f59e0b; }
        .device-badge.e5 { background: #ef4444; }
        .device-badge.e6 { background: #ec4899; }
        .device-badge.default { background: #6b7280; }

        .session-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--accent);
            cursor: pointer;
        }

        .session-name:hover {
            text-decoration: underline;
        }

        .session-name-hint {
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 4px;
        }

        .session-name-input {
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 4px;
            padding: 4px 8px;
            color: var(--text-primary);
            font-size: 14px;
            width: 250px;
        }

        .session-time {
            text-align: right;
        }

        .time-local {
            font-size: 14px;
            font-weight: 500;
        }

        .time-utc {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .session-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .session-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .file-type-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
        }

        .file-type-badge.nav { background: var(--accent); }
        .file-type-badge.imu { background: var(--success); }
        .file-type-badge.wind { background: var(--warning); color: #000; }
        .file-type-badge.rtcm3 { background: #9333ea; }

        .boat-selector {
            font-size: 12px;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .boat-selector:hover {
            border-color: var(--accent);
        }

        .boat-label {
            font-size: 12px;
            padding: 2px 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            cursor: pointer;
        }

        .boat-label:hover {
            background: var(--bg-card);
        }

        .duration {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .ppk-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }

        .ppk-badge .ppk-icon {
            font-size: 11px;
        }

        .ppk-badge .ppk-arrow {
            margin-left: 4px;
            transition: transform 0.2s;
        }

        .ppk-badge.expanded .ppk-arrow {
            transform: rotate(180deg);
        }

        .session-actions {
            display: flex;
            gap: 8px;
        }

        .btn-view {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-view:hover {
            background: var(--accent-hover);
        }

        .btn-delete {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--danger);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-delete:hover {
            opacity: 0.9;
        }

        .btn-delete:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        /* PPK Details Panel */
        .ppk-details {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .ppk-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        @media (max-width: 768px) {
            .ppk-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .ppk-stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }

        .ppk-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .ppk-stat-value {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .ppk-stat-detail {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .ppk-quality-section {
            margin-bottom: 12px;
        }

        .ppk-quality-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .ppk-quality-bar {
            display: flex;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .ppk-quality-segment {
            height: 100%;
        }

        .ppk-quality-fix { background: #10b981; }
        .ppk-quality-float { background: #f59e0b; }
        .ppk-quality-single { background: #ef4444; }

        .ppk-quality-legend {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 12px;
        }

        .ppk-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ppk-legend-color {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        .ppk-processed {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .ppk-error {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #ef4444;
        }

        .loading-state, .error-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .error-state {
            color: var(--danger);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="./" class="logo-link"><h1 class="logo">SailFrames</h1></a>
        <nav style="display: flex; gap: 16px; align-items: center;">
            <a href="./race.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Race Dashboard</a>
            <a href="./session.html" class="nav-link" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem;">Timeline</a>
        </nav>
    </header>

    <div class="sessions-container">
        <div class="toolbar" id="toolbar" style="display: none;">
            <button class="btn-cleanup" id="btn-cleanup" disabled>Cleanup (0)</button>
            <span class="cleanup-hint">Delete sessions &lt;15min or without boat assigned</span>
        </div>

        <div id="sessions-content">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading sessions...</p>
            </div>
        </div>
    </div>

    <script src="./config.js?v=3"></script>
    <script>
        // Initialize dayjs plugins
        dayjs.extend(dayjs_plugin_utc);
        dayjs.extend(dayjs_plugin_timezone);

        const BOSTON_TZ = 'America/New_York';
        const API_URL = window.SAILFRAMES_API_URL || '';

        const DEVICE_COLORS = {
            'E1': 'e1', 'E2': 'e2', 'E3': 'e3',
            'E4': 'e4', 'E5': 'e5', 'E6': 'e6'
        };

        const PPK_STATUS_CONFIG = {
            awaiting_cors: { label: 'Awaiting CORS', color: '#f59e0b', icon: '⏳' },
            cors_downloading: { label: 'Downloading CORS', color: '#3b82f6', icon: '⬇️' },
            cors_ready: { label: 'CORS Ready', color: '#3b82f6', icon: '✓' },
            processing: { label: 'Processing PPK', color: '#8b5cf6', icon: '⚙️' },
            completed: { label: 'PPK Complete', color: '#10b981', icon: '✓' },
            failed: { label: 'PPK Failed', color: '#ef4444', icon: '✗' },
            cors_error: { label: 'CORS Error', color: '#ef4444', icon: '!' }
        };

        const CORS_STATIONS = {
            mami: { name: 'Mass Maritime', location: 'Buzzards Bay, MA' },
            bosm: { name: 'Boston', location: 'Boston, MA' },
            njgt: { name: 'NJ Gateway', location: 'New Jersey' }
        };

        const BOAT_OPTIONS = ['', 'Sonar 23', 'J/80', 'Tesla'];

        let sessions = [];
        let expandedPpk = new Set();
        let editingSession = null;

        // Convert UTC to Boston time
        function utcToBoston(isoTimestamp) {
            if (!isoTimestamp) return null;
            return dayjs(isoTimestamp).tz(BOSTON_TZ).format('h:mm A');
        }

        function getBostonTimezoneAbbr(isoTimestamp) {
            if (!isoTimestamp) return 'ET';
            const dt = dayjs(isoTimestamp).tz(BOSTON_TZ);
            return dt.format('z');
        }

        function getLocalDateKey(utcTimestamp) {
            if (!utcTimestamp) return null;
            return dayjs(utcTimestamp).tz(BOSTON_TZ).format('YYYY-MM-DD');
        }

        function formatUtcTime(isoTimestamp) {
            if (!isoTimestamp) return null;
            return dayjs(isoTimestamp).utc().format('HH:mm:ss');
        }

        function formatDisplayDate(dateStr) {
            if (!dateStr) return dateStr;
            return dayjs(dateStr).format('ddd, MMM D, YYYY');
        }

        function getSessionPath(session) {
            return session.session_id
                ? `${session.date}-${session.session_id}`
                : session.date;
        }

        function getSessionKey(session) {
            return `${session.device_id}-${getSessionPath(session)}`;
        }

        // Fetch sessions from API
        async function fetchSessions() {
            try {
                const response = await fetch(`${API_URL}/api/sessions`);
                if (!response.ok) throw new Error('Failed to load sessions');
                const data = await response.json();
                sessions = data.sessions || [];
                renderSessions();
                updateCleanupButton();
            } catch (err) {
                document.getElementById('sessions-content').innerHTML = `
                    <div class="error-state">
                        <p>Error: ${err.message}</p>
                    </div>
                `;
            }
        }

        // Group sessions by date
        function groupSessionsByDate() {
            const groups = {};

            sessions.forEach(session => {
                const localDate = getLocalDateKey(session.start_time) || session.date;
                if (!groups[localDate]) {
                    groups[localDate] = [];
                }

                const sessionIdParts = (session.session_id || '').split('-');
                const baseSessionId = sessionIdParts[0] || session.session_id;

                groups[localDate].push({
                    ...session,
                    localDate,
                    displayName: baseSessionId || session.date,
                    startTimeBoston: utcToBoston(session.start_time),
                    endTimeBoston: utcToBoston(session.end_time),
                    startTimeUtc: formatUtcTime(session.start_time),
                    endTimeUtc: formatUtcTime(session.end_time),
                    timezoneAbbr: getBostonTimezoneAbbr(session.start_time),
                    sessionPath: getSessionPath(session)
                });
            });

            // Sort sessions within each date
            Object.values(groups).forEach(group => {
                group.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
            });

            // Return sorted by date (newest first)
            return Object.entries(groups)
                .sort(([a], [b]) => b.localeCompare(a))
                .map(([date, sessions]) => ({ date, sessions }));
        }

        // Render all sessions
        function renderSessions() {
            const grouped = groupSessionsByDate();
            const container = document.getElementById('sessions-content');
            document.getElementById('toolbar').style.display = 'flex';

            if (grouped.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>No sessions found.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = grouped.map(({ date, sessions }) => `
                <div class="date-group">
                    <div class="date-header">
                        <h2>${formatDisplayDate(date)}</h2>
                        <span class="date-count">${sessions.length} session${sessions.length !== 1 ? 's' : ''}</span>
                    </div>
                    <div class="sessions-list">
                        ${sessions.map(session => renderSessionCard(session)).join('')}
                    </div>
                </div>
            `).join('');

            // Add event listeners
            attachEventListeners();
        }

        // Render a single session card
        function renderSessionCard(session) {
            const sessionKey = getSessionKey(session);
            const deviceClass = DEVICE_COLORS[session.device_id] || 'default';
            const sensorTypes = getSensorTypes(session.sensors);
            const isExpanded = expandedPpk.has(sessionKey);

            return `
                <div class="session-card" data-session-key="${sessionKey}">
                    <div class="session-header">
                        <div class="session-id">
                            <span class="device-badge ${deviceClass}">${session.device_id}</span>
                            <span class="session-name" data-device="${session.device_id}" data-path="${session.sessionPath}" data-field="name">
                                ${session.name || session.displayName}
                                ${!session.name ? '<span class="session-name-hint">(click to name)</span>' : ''}
                            </span>
                        </div>
                        <div class="session-time">
                            <span class="time-local">${session.startTimeBoston} — ${session.endTimeBoston} ${session.timezoneAbbr}</span>
                            <span class="time-utc">(${session.startTimeUtc} — ${session.endTimeUtc} UTC) · ${session.duration_minutes || 0} min</span>
                        </div>
                    </div>
                    <div class="session-details">
                        <div class="session-meta">
                            ${sensorTypes.map(type => `<span class="file-type-badge ${type}">${type.toUpperCase()}</span>`).join('')}
                            <span class="boat-label" data-device="${session.device_id}" data-path="${session.sessionPath}" data-field="boat">
                                ${session.boat || 'Set boat...'}
                            </span>
                            <span class="duration">${session.duration_minutes || 0} min</span>
                            ${renderPpkBadge(session, isExpanded)}
                        </div>
                        <div class="session-actions">
                            <button class="btn-view" data-device="${session.device_id}" data-path="${session.sessionPath}">View in Dashboard</button>
                            <button class="btn-delete" data-device="${session.device_id}" data-path="${session.sessionPath}" data-name="${session.name || session.displayName}" data-duration="${session.duration_minutes || 0}">Delete</button>
                        </div>
                    </div>
                    ${isExpanded ? renderPpkDetails(session) : ''}
                </div>
            `;
        }

        function getSensorTypes(sensors) {
            const types = [];
            if (sensors?.gps) types.push('nav');
            if (sensors?.imu) types.push('imu');
            if (sensors?.wind) types.push('wind');
            if (sensors?.rtcm3) types.push('rtcm3');
            return types;
        }

        function renderPpkBadge(session, isExpanded) {
            if (!session.ppk_status && !session.sensors?.rtcm3) return '';

            const status = session.ppk_status || 'no_rtcm3';
            const config = PPK_STATUS_CONFIG[status];
            if (!config) return '';

            const isExpandable = status === 'completed' || status === 'failed';
            const sessionKey = getSessionKey(session);
            const fixRate = session.ppk_stats?.fix_rate;

            return `
                <span class="ppk-badge ${isExpanded ? 'expanded' : ''}"
                      style="background: ${config.color}20; border: 1px solid ${config.color}40;"
                      data-session-key="${sessionKey}"
                      data-expandable="${isExpandable}">
                    <span class="ppk-icon">${config.icon}</span>
                    <span style="color: ${config.color}; font-weight: 500;">
                        ${config.label}${fixRate !== undefined ? ` (${fixRate}% fix)` : ''}
                    </span>
                    ${isExpandable ? '<span class="ppk-arrow">▼</span>' : ''}
                </span>
            `;
        }

        function renderPpkDetails(session) {
            const stats = session.ppk_stats;

            if (session.ppk_status === 'failed') {
                return `
                    <div class="ppk-details">
                        <div class="ppk-error">
                            <span>⚠️</span>
                            <span>${session.ppk_error || 'Unknown error'}</span>
                        </div>
                    </div>
                `;
            }

            if (!stats) return '';

            const total = (stats.fix_count || 0) + (stats.float_count || 0) + (stats.single_count || 0);
            const fixPct = total > 0 ? ((stats.fix_count || 0) / total * 100) : 0;
            const floatPct = total > 0 ? ((stats.float_count || 0) / total * 100) : 0;
            const singlePct = total > 0 ? ((stats.single_count || 0) / total * 100) : 0;

            const corsInfo = CORS_STATIONS[stats.cors_station] || { name: stats.cors_station?.toUpperCase() || '—' };

            const avgNE = stats.avg_sdn && stats.avg_sde
                ? Math.sqrt(stats.avg_sdn ** 2 + stats.avg_sde ** 2)
                : null;

            const processedAt = stats.processed_at
                ? dayjs(stats.processed_at).tz(BOSTON_TZ).format('MMM D [at] h:mm A')
                : null;

            return `
                <div class="ppk-details">
                    <div class="ppk-stats-grid">
                        <div class="ppk-stat-card">
                            <div class="ppk-stat-label">Fix Rate</div>
                            <div class="ppk-stat-value">${stats.fix_rate}%</div>
                            <div class="ppk-stat-detail">${(stats.fix_count || 0).toLocaleString()} fixed</div>
                        </div>
                        <div class="ppk-stat-card">
                            <div class="ppk-stat-label">Points</div>
                            <div class="ppk-stat-value">${(stats.points || 0).toLocaleString()}</div>
                            <div class="ppk-stat-detail">${session.duration_minutes ? `~${Math.round(stats.points / session.duration_minutes / 60)}Hz` : ''}</div>
                        </div>
                        <div class="ppk-stat-card">
                            <div class="ppk-stat-label">Accuracy</div>
                            <div class="ppk-stat-value">${avgNE ? avgNE.toFixed(2) + 'm' : '—'}</div>
                            <div class="ppk-stat-detail">${stats.avg_sdu ? stats.avg_sdu.toFixed(2) + 'm Up' : 'horizontal'}</div>
                        </div>
                        <div class="ppk-stat-card">
                            <div class="ppk-stat-label">Base Station</div>
                            <div class="ppk-stat-value">${stats.cors_station?.toUpperCase() || '—'}</div>
                            <div class="ppk-stat-detail">${corsInfo.name}</div>
                        </div>
                    </div>
                    <div class="ppk-quality-section">
                        <div class="ppk-quality-label">Quality Breakdown</div>
                        <div class="ppk-quality-bar">
                            ${fixPct > 0 ? `<div class="ppk-quality-segment ppk-quality-fix" style="width: ${fixPct}%" title="Fix: ${stats.fix_count} (${fixPct.toFixed(1)}%)"></div>` : ''}
                            ${floatPct > 0 ? `<div class="ppk-quality-segment ppk-quality-float" style="width: ${floatPct}%" title="Float: ${stats.float_count} (${floatPct.toFixed(1)}%)"></div>` : ''}
                            ${singlePct > 0 ? `<div class="ppk-quality-segment ppk-quality-single" style="width: ${singlePct}%" title="Single: ${stats.single_count} (${singlePct.toFixed(1)}%)"></div>` : ''}
                        </div>
                        <div class="ppk-quality-legend">
                            <span class="ppk-legend-item"><span class="ppk-legend-color ppk-quality-fix"></span> Fix ${fixPct.toFixed(1)}%</span>
                            <span class="ppk-legend-item"><span class="ppk-legend-color ppk-quality-float"></span> Float ${floatPct.toFixed(1)}%</span>
                            <span class="ppk-legend-item"><span class="ppk-legend-color ppk-quality-single"></span> Single ${singlePct.toFixed(1)}%</span>
                        </div>
                    </div>
                    ${processedAt ? `<div class="ppk-processed">Processed: ${processedAt}</div>` : ''}
                </div>
            `;
        }

        // Attach event listeners
        function attachEventListeners() {
            // View in Dashboard
            document.querySelectorAll('.btn-view').forEach(btn => {
                btn.addEventListener('click', () => {
                    const device = btn.dataset.device;
                    const path = btn.dataset.path;
                    window.open(`./session.html?session=${device}/${path}`, '_blank');
                });
            });

            // Delete session
            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const device = btn.dataset.device;
                    const path = btn.dataset.path;
                    const name = btn.dataset.name;
                    const duration = btn.dataset.duration;

                    if (!confirm(`Delete session "${name}" (${duration} min)?\n\nThis will permanently delete all data for this session.`)) {
                        return;
                    }

                    btn.disabled = true;
                    btn.textContent = '...';

                    try {
                        const response = await fetch(`${API_URL}/api/sessions/${device}/${path}`, {
                            method: 'DELETE'
                        });
                        if (!response.ok) throw new Error('Failed to delete');
                        fetchSessions();
                    } catch (err) {
                        alert(`Error deleting session: ${err.message}`);
                        btn.disabled = false;
                        btn.textContent = 'Delete';
                    }
                });
            });

            // Edit session name
            document.querySelectorAll('.session-name').forEach(el => {
                el.addEventListener('click', () => startEdit(el, 'name'));
            });

            // Edit boat
            document.querySelectorAll('.boat-label').forEach(el => {
                el.addEventListener('click', () => startEdit(el, 'boat'));
            });

            // PPK expand/collapse
            document.querySelectorAll('.ppk-badge[data-expandable="true"]').forEach(badge => {
                badge.addEventListener('click', () => {
                    const sessionKey = badge.dataset.sessionKey;
                    if (expandedPpk.has(sessionKey)) {
                        expandedPpk.delete(sessionKey);
                    } else {
                        expandedPpk.add(sessionKey);
                    }
                    renderSessions();
                });
            });
        }

        // Start editing a field
        function startEdit(el, field) {
            const device = el.dataset.device;
            const path = el.dataset.path;
            const session = sessions.find(s => s.device_id === device && getSessionPath(s) === path);
            if (!session) return;

            const currentValue = session[field] || '';

            if (field === 'boat') {
                // Show dropdown
                const select = document.createElement('select');
                select.className = 'boat-selector';
                BOAT_OPTIONS.forEach(opt => {
                    const option = document.createElement('option');
                    option.value = opt;
                    option.textContent = opt || 'Select boat...';
                    if (opt === currentValue) option.selected = true;
                    select.appendChild(option);
                });

                select.addEventListener('change', () => saveEdit(device, path, field, select.value));
                select.addEventListener('blur', () => saveEdit(device, path, field, select.value));

                el.replaceWith(select);
                select.focus();
            } else {
                // Show text input
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'session-name-input';
                input.value = currentValue;
                input.placeholder = 'Session name...';

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') saveEdit(device, path, field, input.value);
                    if (e.key === 'Escape') renderSessions();
                });
                input.addEventListener('blur', () => saveEdit(device, path, field, input.value));

                el.replaceWith(input);
                input.focus();
                input.select();
            }
        }

        // Save edit
        async function saveEdit(device, path, field, value) {
            try {
                const response = await fetch(`${API_URL}/api/sessions/${device}/${path}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [field]: value || null })
                });
                if (!response.ok) throw new Error('Failed to save');
                fetchSessions();
            } catch (err) {
                alert(`Error saving: ${err.message}`);
                renderSessions();
            }
        }

        // Cleanup button
        function updateCleanupButton() {
            const MAX_DURATION_MIN = 15;
            const toDelete = sessions.filter(s => {
                if (s.duration_sec === undefined || s.duration_sec === null) return false;
                const durationMin = s.duration_sec / 60;
                return durationMin < MAX_DURATION_MIN || (durationMin >= MAX_DURATION_MIN && !s.boat);
            });

            const btn = document.getElementById('btn-cleanup');
            btn.textContent = `🧹 Cleanup (${toDelete.length})`;
            btn.disabled = toDelete.length === 0;
        }

        document.getElementById('btn-cleanup').addEventListener('click', async () => {
            const MAX_DURATION_MIN = 15;
            const toDelete = sessions.filter(s => {
                if (s.duration_sec === undefined || s.duration_sec === null) return false;
                const durationMin = s.duration_sec / 60;
                return durationMin < MAX_DURATION_MIN || (durationMin >= MAX_DURATION_MIN && !s.boat);
            });

            if (toDelete.length === 0) {
                alert('No sessions to cleanup.');
                return;
            }

            const reasons = toDelete.slice(0, 15).map(s => {
                const durationMin = Math.round((s.duration_sec || 0) / 60);
                const sessionPath = getSessionPath(s);
                if (durationMin < MAX_DURATION_MIN) {
                    return `• ${s.device_id}/${sessionPath} (${durationMin}min < 15min)`;
                }
                return `• ${s.device_id}/${sessionPath} (no boat)`;
            });

            const moreText = toDelete.length > 15 ? `\n... and ${toDelete.length - 15} more` : '';

            if (!confirm(`Found ${toDelete.length} sessions to delete:\n\n${reasons.join('\n')}${moreText}\n\nDelete these sessions permanently?`)) {
                return;
            }

            const btn = document.getElementById('btn-cleanup');
            btn.disabled = true;
            btn.textContent = 'Cleaning...';

            let deleted = 0;
            let errors = 0;

            for (const s of toDelete) {
                try {
                    const resp = await fetch(`${API_URL}/api/sessions/${s.device_id}/${getSessionPath(s)}`, {
                        method: 'DELETE'
                    });
                    if (resp.ok) deleted++;
                    else errors++;
                } catch {
                    errors++;
                }
            }

            alert(`Cleanup complete!\n\nDeleted: ${deleted}\nErrors: ${errors}`);
            fetchSessions();
        });

        // Initialize
        fetchSessions();
    </script>
</body>
</html>
