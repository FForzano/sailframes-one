# Alembic config for the SailFrames Postgres metadata backend.
#
# The database URL is NOT set here — env.py builds it from the same
# DATABASE_URL / POSTGRES_* env vars the app uses (see web/api/db/__init__.py),
# so migrations and the app never diverge on connection settings.
#
# Run from the repo root:   alembic -c web/api/alembic.ini upgrade head
# (the app can also run this automatically at startup with
#  SAILFRAMES_USE_ALEMBIC=1 — see db/__init__.py:run_migrations)

[alembic]
script_location = web/api/alembic
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
