<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SailFrames - Admin</title>
    <link rel="stylesheet" href="./assets/css/main.css?v=10">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-align: center;
        }
        .admin-container h1 {
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        .admin-container p {
            color: var(--text-secondary);
            margin-bottom: 20px;
        }
        .status {
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .status.authenticated {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }
        .status.not-authenticated {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: var(--accent);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="./" class="logo-link"><h1 class="logo">SailFrames</h1></a>
    </header>

    <div class="admin-container">
        <h1>Admin Authentication</h1>
        <p>This page is protected by Cloudflare Access.</p>

        <div id="status" class="status">
            Checking authentication status...
        </div>

        <a href="./" class="back-link">&larr; Back to Dashboard</a>
    </div>

    <script>
        // Check if CF_Authorization cookie exists
        function isAuthenticated() {
            return document.cookie.includes('CF_Authorization');
        }

        const statusEl = document.getElementById('status');

        if (isAuthenticated()) {
            statusEl.className = 'status authenticated';
            statusEl.innerHTML = `
                <strong>Authenticated</strong><br>
                You have admin access. All admin functions are now available.
            `;
        } else {
            statusEl.className = 'status not-authenticated';
            statusEl.innerHTML = `
                <strong>Not Authenticated</strong><br>
                If you should have admin access, Cloudflare Access will prompt you to sign in.
                <br><br>
                <em>Note: Cloudflare Access must be configured to protect this page.</em>
            `;
        }
    </script>
</body>
</html>
