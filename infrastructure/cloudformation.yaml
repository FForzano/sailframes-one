AWSTemplateFormatVersion: '2010-09-09'
Description: SailFrames Analytics Platform - Serverless Infrastructure

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
    Description: Deployment environment
  DataBucketName:
    Type: String
    Default: sailframes-fleet-data-prod
    Description: Existing S3 bucket for fleet data (created by Terraform)

Resources:
  # ============================================
  # S3 BUCKETS
  # ============================================
  # Note: Data bucket (sailframes-fleet-data-prod) already exists from Terraform deployment
  # We reference it by name instead of creating a new one

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sailframes-web-${Environment}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'

  # ============================================
  # IAM ROLES
  # ============================================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'sailframes-lambda-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${DataBucketName}'
                  - !Sub 'arn:aws:s3:::${DataBucketName}/*'
        - PolicyName: DLQAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt ProcessUploadDLQ.Arn
        - PolicyName: LambdaInvokeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sailframes-cors-download'
                  - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sailframes-ppk-process'

  PiUploaderUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub 'sailframes-pi-uploader-${Environment}'
      Policies:
        - PolicyName: S3UploadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub 'arn:aws:s3:::${DataBucketName}/raw/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Sub 'arn:aws:s3:::${DataBucketName}'

  # ============================================
  # LAMBDA FUNCTIONS
  # ============================================

  # DLQ for failed processing events
  ProcessUploadDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'sailframes-process-upload-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Project
          Value: SailFrames

  ProcessUploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-process-upload-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      DeadLetterConfig:
        TargetArn: !GetAtt ProcessUploadDLQ.Arn
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: process_upload.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  # Alarm on processing errors
  ProcessUploadErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sailframes-process-upload-errors-${Environment}'
      AlarmDescription: Fires when process_upload Lambda has errors (failed session processing)
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ProcessUploadFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # Alarm when DLQ has messages (events that exhausted retries)
  ProcessUploadDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'sailframes-process-upload-dlq-${Environment}'
      AlarmDescription: Fires when failed processing events land in DLQ (exhausted retries)
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ProcessUploadDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  ProcessUploadPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessUploadFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:s3:::${DataBucketName}'

  ApiSessionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-sessions-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_sessions.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  ApiDataFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-data-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_data.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  ApiVideoFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-video-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_video.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName
          CLOUDFRONT_DOMAIN: !GetAtt WebsiteBucket.WebsiteURL

  ApiAnalysisFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-analysis-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_analysis.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  ApiE1Function:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-e1-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_e1.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  ApiBuoysFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-buoys-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_buoys.zip

  ApiRaceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-race-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_race.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  # ============================================
  # VIDEO LINKING (GoPro to E1 sessions)
  # ============================================

  LinkVideosFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-link-videos-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 120
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: link_videos.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName

  LinkVideosPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LinkVideosFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:s3:::${DataBucketName}'

  # ============================================
  # VIDEO TRANSCODING
  # ============================================

  MediaConvertRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'sailframes-mediaconvert-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: mediaconvert.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MediaConvertS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${DataBucketName}/*'

  TranscodeVideoFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-transcode-video-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt TranscodeLambdaRole.Arn
      Timeout: 60
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: transcode_video.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName
          MEDIACONVERT_ROLE: !GetAtt MediaConvertRole.Arn
          MEDIACONVERT_ENDPOINT: !Sub 'https://mediaconvert.${AWS::Region}.amazonaws.com'
          CLOUDFRONT_DOMAIN: sailframes.com

  TranscodeCompleteFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-transcode-complete-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 120
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: transcode_complete.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucketName
          CLOUDFRONT_DOMAIN: sailframes.com

  TranscodeLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'sailframes-transcode-lambda-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${DataBucketName}'
                  - !Sub 'arn:aws:s3:::${DataBucketName}/*'
        - PolicyName: MediaConvertAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - mediaconvert:CreateJob
                  - mediaconvert:GetJob
                  - mediaconvert:DescribeEndpoints
                Resource: '*'
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt MediaConvertRole.Arn

  TranscodeVideoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TranscodeVideoFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:s3:::${DataBucketName}'

  # EventBridge rule to trigger on MediaConvert job completion
  MediaConvertCompleteRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'sailframes-transcode-complete-${Environment}'
      Description: Trigger Lambda when MediaConvert job completes
      EventPattern:
        source:
          - aws.mediaconvert
        detail-type:
          - MediaConvert Job State Change
        detail:
          status:
            - COMPLETE
            - ERROR
      State: ENABLED
      Targets:
        - Id: TranscodeCompleteLambda
          Arn: !GetAtt TranscodeCompleteFunction.Arn

  MediaConvertCompletePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TranscodeCompleteFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MediaConvertCompleteRule.Arn

  # ============================================
  # PPK PIPELINE - CORS DOWNLOAD SCHEDULE
  # ============================================
  # Hourly safety net: scans for sessions stuck at awaiting_cors
  # Primary trigger is process_upload invoking cors_download directly on RTCM3 upload

  CorsDownloadScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub 'sailframes-cors-download-hourly-${Environment}'
      Description: Hourly check for sessions needing CORS data for PPK processing
      ScheduleExpression: 'rate(1 hour)'
      State: ENABLED
      Targets:
        - Id: CorsDownloadLambda
          Arn: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:sailframes-cors-download'

  CorsDownloadSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: sailframes-cors-download
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CorsDownloadScheduleRule.Arn

  # ============================================
  # API GATEWAY
  # ============================================

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'sailframes-api-${Environment}'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, OPTIONS]
        AllowHeaders: ['*']
        MaxAge: 3600

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: '$default'
      AutoDeploy: true

  # Sessions endpoint
  SessionsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiSessionsFunction.Arn
      PayloadFormatVersion: '2.0'

  SessionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/sessions'
      Target: !Sub 'integrations/${SessionsIntegration}'

  SessionsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiSessionsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Data endpoint
  DataIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiDataFunction.Arn
      PayloadFormatVersion: '2.0'

  DataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/data/{device_id}/{date}'
      Target: !Sub 'integrations/${DataIntegration}'

  DataPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiDataFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Video endpoint
  VideoIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiVideoFunction.Arn
      PayloadFormatVersion: '2.0'

  VideoRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/video/{device_id}/{date}'
      Target: !Sub 'integrations/${VideoIntegration}'

  VideoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiVideoFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Analysis endpoint
  AnalysisIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiAnalysisFunction.Arn
      PayloadFormatVersion: '2.0'

  AnalysisRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/analysis/{device_id}/{date}'
      Target: !Sub 'integrations/${AnalysisIntegration}'

  AnalysisPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiAnalysisFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # E1 Fleet Data endpoints
  E1Integration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiE1Function.Arn
      PayloadFormatVersion: '2.0'

  E1DevicesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/e1/devices'
      Target: !Sub 'integrations/${E1Integration}'

  E1UploadsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/e1/devices/{device_id}/uploads'
      Target: !Sub 'integrations/${E1Integration}'

  E1FilesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/e1/files/{device_id}/{date}/{filename}'
      Target: !Sub 'integrations/${E1Integration}'

  E1Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiE1Function
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # NOAA Buoy Data endpoints
  BuoysIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiBuoysFunction.Arn
      PayloadFormatVersion: '2.0'

  BuoysListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/buoys'
      Target: !Sub 'integrations/${BuoysIntegration}'

  BuoysDataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/buoys/data'
      Target: !Sub 'integrations/${BuoysIntegration}'

  BuoysSnapshotRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/buoys/snapshot'
      Target: !Sub 'integrations/${BuoysIntegration}'

  BuoysPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiBuoysFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Race and Regatta endpoints
  RaceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiRaceFunction.Arn
      PayloadFormatVersion: '2.0'

  RacesListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/races'
      Target: !Sub 'integrations/${RaceIntegration}'

  RacesCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/races'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/races/{race_id}'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'PATCH /api/races/{race_id}'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'DELETE /api/races/{race_id}'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceDataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/races/{race_id}/data'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceMatchSessionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/races/{race_id}/match-sessions'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceAutoStartLineRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/races/{race_id}/auto-start-line'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceSuggestMarksRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/races/{race_id}/suggest-marks'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceBoatGpxRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/races/{race_id}/boats/{device_id}/gpx'
      Target: !Sub 'integrations/${RaceIntegration}'

  RaceGpxStatusRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/races/{race_id}/gpx-status'
      Target: !Sub 'integrations/${RaceIntegration}'

  RegattasListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/regattas'
      Target: !Sub 'integrations/${RaceIntegration}'

  RegattasCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/regattas'
      Target: !Sub 'integrations/${RaceIntegration}'

  RegattaGetRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/regattas/{regatta_id}'
      Target: !Sub 'integrations/${RaceIntegration}'

  RegattaUpdateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'PATCH /api/regattas/{regatta_id}'
      Target: !Sub 'integrations/${RaceIntegration}'

  RegattaDeleteRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'DELETE /api/regattas/{regatta_id}'
      Target: !Sub 'integrations/${RaceIntegration}'

  RacePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiRaceFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

Outputs:
  WebsiteURL:
    Description: S3 Website URL (use this until CloudFront is set up)
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'

  DataBucketName:
    Description: S3 bucket for race data
    Value: !Ref DataBucketName
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  WebsiteBucketName:
    Description: S3 bucket for website assets
    Value: !Ref WebsiteBucket
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteBucket'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  PiUploaderUser:
    Description: IAM user for Pi devices to upload data
    Value: !Ref PiUploaderUser
    Export:
      Name: !Sub '${AWS::StackName}-PiUploaderUser'
