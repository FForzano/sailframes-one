AWSTemplateFormatVersion: '2010-09-09'
Description: SailFrames Analytics Platform - Serverless Infrastructure

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [prod, staging]
    Description: Deployment environment

Resources:
  # ============================================
  # S3 BUCKETS
  # ============================================

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sailframes-data-${Environment}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldRawData
            Status: Enabled
            Prefix: raw/
            ExpirationInDays: 365

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'sailframes-web-${Environment}'
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'

  # ============================================
  # IAM ROLES
  # ============================================

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'sailframes-lambda-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'

  PiUploaderUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub 'sailframes-pi-uploader-${Environment}'
      Policies:
        - PolicyName: S3UploadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                Resource: !Sub '${DataBucket.Arn}/raw/*'
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt DataBucket.Arn

  # ============================================
  # LAMBDA FUNCTIONS
  # ============================================

  ProcessUploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-process-upload-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: process_upload.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucket

  ProcessUploadPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProcessUploadFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt DataBucket.Arn

  ApiSessionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-sessions-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_sessions.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucket

  ApiDataFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-data-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_data.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucket

  ApiVideoFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'sailframes-api-video-${Environment}'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Sub 'sailframes-lambda-code-${Environment}'
        S3Key: api_video.zip
      Environment:
        Variables:
          DATA_BUCKET: !Ref DataBucket
          CLOUDFRONT_DOMAIN: !GetAtt WebsiteBucket.WebsiteURL

  # ============================================
  # API GATEWAY
  # ============================================

  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub 'sailframes-api-${Environment}'
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, OPTIONS]
        AllowHeaders: ['*']
        MaxAge: 3600

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: '$default'
      AutoDeploy: true

  # Sessions endpoint
  SessionsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiSessionsFunction.Arn
      PayloadFormatVersion: '2.0'

  SessionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/sessions'
      Target: !Sub 'integrations/${SessionsIntegration}'

  SessionsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiSessionsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Data endpoint
  DataIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiDataFunction.Arn
      PayloadFormatVersion: '2.0'

  DataRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/data/{device_id}/{date}'
      Target: !Sub 'integrations/${DataIntegration}'

  DataPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiDataFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

  # Video endpoint
  VideoIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiVideoFunction.Arn
      PayloadFormatVersion: '2.0'

  VideoRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/video/{device_id}/{date}'
      Target: !Sub 'integrations/${VideoIntegration}'

  VideoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiVideoFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*'

Outputs:
  WebsiteURL:
    Description: S3 Website URL (use this until CloudFront is set up)
    Value: !GetAtt WebsiteBucket.WebsiteURL
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'

  DataBucketName:
    Description: S3 bucket for race data
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  WebsiteBucketName:
    Description: S3 bucket for website assets
    Value: !Ref WebsiteBucket
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteBucket'

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com'
    Export:
      Name: !Sub '${AWS::StackName}-ApiEndpoint'

  PiUploaderUser:
    Description: IAM user for Pi devices to upload data
    Value: !Ref PiUploaderUser
    Export:
      Name: !Sub '${AWS::StackName}-PiUploaderUser'
